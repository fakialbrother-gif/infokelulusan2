<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info Kelulusan</title>
  <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI', sans-serif;
    }

    body{
        background: linear-gradient(135deg,#0f172a,#1e293b);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:500px;
        background:#fff;
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
        animation:fade 0.7s ease;
    }

    @keyframes fade{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    .header{
        background:linear-gradient(135deg,#2563eb,#1d4ed8);
        color:white;
        text-align:center;
        padding:30px 20px;
    }

    .header img{
        width:90px;
        margin-bottom:15px;
    }

    .header h1{
        font-size:28px;
        margin-bottom:8px;
    }

    .header p{
        font-size:14px;
        opacity:0.9;
    }

    .content{
        padding:30px;
    }

    .form-group{
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-bottom:8px;
        font-weight:600;
        color:#334155;
    }

    input{
        width:100%;
        padding:14px;
        border:2px solid #cbd5e1;
        border-radius:12px;
        outline:none;
        transition:0.3s;
        font-size:15px;
    }

    input:focus{
        border-color:#2563eb;
        box-shadow:0 0 10px rgba(37,99,235,0.2);
    }

    button{
        width:100%;
        padding:14px;
        border:none;
        border-radius:12px;
        background:linear-gradient(135deg,#2563eb,#1d4ed8);
        color:white;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.02);
    }

    button:active{
        transform:scale(0.98);
    }

    .result{
        margin-top:25px;
        padding:20px;
        border-radius:15px;
        display:none;
        animation:fade 0.5s ease;
    }

    .lulus{
        background:#dcfce7;
        border:2px solid #22c55e;
        color:#166534;
    }

    .tidak{
        background:#fee2e2;
        border:2px solid #ef4444;
        color:#991b1b;
    }

    .result h2{
        margin-bottom:10px;
        font-size:18px;
    }

    .result p{
        margin:8px 0;
        font-size:14px;
    }

    .footer{
        text-align:center;
        padding:15px;
        background:#f8fafc;
        font-size:13px;
        color:#64748b;
    }

    @media(max-width:500px){
        .content{
            padding:20px;
        }

        .header h1{
            font-size:22px;
        }
    }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="container">
   <div class="header"><img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" alt="Logo">
    <h1>Info Kelulusan</h1>
    <p>SMK / SMA Tahun Ajaran 2025/2026</p>
   </div>
   <div class="content">
    <div class="form-group"><label>Masukkan NISN</label> <input type="text" id="nisn" placeholder="Contoh: 1234567890">
    </div><button onclick="cekKelulusan()">Cek Kelulusan</button>
    <div id="hasil"></div>
   </div>
   <div class="footer">
    © 2026 Sistem Informasi Kelulusan Sekolah
   </div>
  </div>
  <script>
function cekKelulusan(){

    let nisn = document.getElementById("nisn").value;
    let hasil = document.getElementById("hasil");

    // DATA CONTOH
    let data = {
        "1234567890": {
            nama: "Faki Al Brother",
            kelas: "XII RPL 1",
            status: "LULUS"
        },

        "9876543210": {
            nama: "Budi Santoso",
            kelas: "XII TKJ 2",
            status: "TIDAK LULUS"
        }
    };

    if(nisn === ""){
        hasil.innerHTML = '<div class="result tidak"><h2>⚠️ Peringatan</h2><p>Silakan masukkan NISN terlebih dahulu!</p></div>';
        hasil.style.display = "block";
        return;
    }

    if(data[nisn]){
        let siswa = data[nisn];
        let statusClass = siswa.status === "LULUS" ? "lulus" : "tidak";
        let icon = siswa.status === "LULUS" ? "✅" : "❌";
        
        hasil.innerHTML = `
            <div class="result ${statusClass}">
                <h2>${icon} ${siswa.status}</h2>
                <p><strong>Nama:</strong> ${siswa.nama}</p>
                <p><strong>Kelas:</strong> ${siswa.kelas}</p>
                <p><strong>Status:</strong> ${siswa.status}</p>
            </div>
        `;
        hasil.style.display = "block";
    } else {
        hasil.innerHTML = '<div class="result tidak"><h2>❌ Tidak Ditemukan</h2><p>NISN tidak terdaftar dalam sistem. Silakan periksa kembali nomor NISN Anda.</p></div>';
        hasil.style.display = "block";
    }
}
</script>

</html>
