<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info Kelulusan</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#2563eb;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#hasil{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    display:none;
}

.sukses{
    background:#dcfce7;
    color:#166534;
}

.gagal{
    background:#fee2e2;
    color:#991b1b;
}

</style>
</head>
<body>

<div class="box">

    <h1>INFO KELULUSAN</h1>

    <input type="text" id="nisn" placeholder="Masukkan NISN">

    <button id="btnCek">
        CEK KELULUSAN
    </button>

    <div id="hasil"></div>

</div>

<script>

document.getElementById("btnCek").addEventListener("click", function(){

    let nisn = document.getElementById("nisn").value;
    let hasil = document.getElementById("hasil");

    // DATA SISWA
    let dataSiswa = {

        "123456": {
            nama: "Faki Al Brother",
            kelas: "XII RPL 1",
            status: "LULUS"
        },

        "789101": {
            nama: "Budi Santoso",
            kelas: "XII TKJ 2",
            status: "TIDAK LULUS"
        }

    };

    // JIKA KOSONG
    if(nisn == ""){

        hasil.style.display = "block";
        hasil.className = "gagal";

        hasil.innerHTML = "Masukkan NISN terlebih dahulu";

        return;
    }

    // CEK DATA
    if(dataSiswa[nisn]){

        let siswa = dataSiswa[nisn];

        hasil.style.display = "block";

        if(siswa.status == "LULUS"){

            hasil.className = "sukses";

            hasil.innerHTML =
            "<h2>🎉 SELAMAT ANDA LULUS</h2>" +
            "<p><b>Nama:</b> " + siswa.nama + "</p>" +
            "<p><b>Kelas:</b> " + siswa.kelas + "</p>" +
            "<p><b>Status:</b> " + siswa.status + "</p>";

        }else{

            hasil.className = "gagal";

            hasil.innerHTML =
            "<h2>❌ ANDA TIDAK LULUS</h2>" +
            "<p><b>Nama:</b> " + siswa.nama + "</p>" +
            "<p><b>Kelas:</b> " + siswa.kelas + "</p>" +
            "<p><b>Status:</b> " + siswa.status + "</p>";
        }

    }else{

        hasil.style.display = "block";
        hasil.className = "gagal";

        hasil.innerHTML = "Data tidak ditemukan";
    }

});

</script>

</body>
</html>
